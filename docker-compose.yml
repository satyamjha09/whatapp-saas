services:
  postgres:
    image: postgres:16
    container_name: whatsapp-saas-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: whatsapp_saas
    ports:
      - "5432:5432"
    volumes:
      - whatsapp_saas_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: whatsapp-saas-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  whatsapp_saas_postgres_data:
